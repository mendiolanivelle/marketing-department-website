<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceptance Criteria — Exodia Game Development</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(180deg, #FAFAFA 0%, #FFF5F0 100%); min-height: 100vh; color: #1B1A1C; }
    .header { background: linear-gradient(135deg, #1B1A1C 0%, #2D2B2E 100%); border-bottom: 3px solid #FF5900; padding: 40px 20px; text-align: center; }
    .header h1 { color: #fff; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .header .id-badge { display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px; border-radius: 999px; background: rgba(255,89,0,0.15); font-size: 12px; font-family: monospace; color: #FF8C42; font-weight: 600; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 16px; }
    .card { background: #fff; border: 2px solid #E5E7EB; border-radius: 16px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .card-header { background: #1B1A1C; padding: 16px 24px; border-bottom: 2px solid #1B1A1C; }
    .card-header h2 { color: #fff; font-size: 14px; font-weight: 500; }
    .card-body { padding: 20px 24px; }
    .row { display: flex; border-bottom: 1px solid #F3F4F6; padding: 10px 0; }
    .row:last-child { border-bottom: none; }
    .row-label { width: 200px; flex-shrink: 0; font-size: 13px; color: #6B7280; }
    .row-value { font-size: 13px; color: #1B1A1C; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; font-size: 13px; border-collapse: collapse; }
    th { background: #F9FAFB; padding: 8px; text-align: left; font-weight: 500; color: #6B7280; }
    td { padding: 8px; border-top: 1px solid #F3F4F6; color: #1B1A1C; }
    .footer { padding: 24px 16px; text-align: center; border-top: 2px solid #E5E7EB; background: #fff; }
    .footer p { font-size: 12px; color: #9CA3AF; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E5E7EB; border-top-color: #FF5900; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 20px; text-align: center; }
    .error-icon { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; background: linear-gradient(135deg, #FFF0E6, #FFE4D0); }
    .error-icon svg { width: 32px; height: 32px; color: #FF5900; }
    .error-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #1B1A1C; }
    .error-desc { font-size: 14px; color: #6B7280; margin-bottom: 8px; max-width: 400px; }
    .error-id { font-size: 12px; font-family: monospace; color: #9CA3AF; margin-bottom: 24px; }
    </style>
</head>

    const { createClient } = supabase;

    (async () => {
      const SUPABASE_URL = 'https://extkotvjigtswrrnxikw.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_17C83bnQAgpEwASSlFKxZw_6U6Qaa4o';

      const id = params.get('id') || '';

      if (!id) {
        document.getElementById('root').innerHTML = `

            <div class="error-icon">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

            </div>
            <h1 class="error-title">Invalid Link</h1>
            <p class="error-desc">This link is missing required information. Please check the link or contact the Marketing Department.</p>
          </div>`;
        return;

        let sub = null;

          const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: false }
          });
          const { data: anonData } = await supabase.auth.signInAnonymously();
          if (anonData) {
            const { data: formData, error: queryError } = await supabase
              .from('acceptance_forms')
              .select('*')
              .eq('id', id)
              .maybeSingle();
            if (!queryError && formData) {
              sub = formData;
            }
          }
        } catch (e) {
          // Anonymous sign-in not available, fall through
        }

        // Method 2: Try edge function (bypasses RLS with service_role)

          try {
            const res = await fetch(SUPABASE_URL + '/functions/v1/get-public-form?id=' + encodeURIComponent(id));

        function Row(label, value) {
          if (!value) value = '\u2014';
          return '<div class="row"><span class="row-label">' + label + '</span><span class="row-value">' + value + '</span></div>';

        function MultiRow(label, items) {
          const vals = (items || []).filter(Boolean).join(', ') || '\u2014';
          return Row(label, vals);

            sub.deliverables.map(function(d) {

            }).join('') +
            '</tbody></table></div>'
