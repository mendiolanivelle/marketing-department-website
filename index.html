<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <title>Marketing Department - Internal Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
      (function(){
        var noise=['message port closed','runtime.lastError','i18next','Locize','pendingMailEnrichStorage','AuthUtils','Failed to fetch dynamically imported module','Importing a module script failed','Expected a JavaScript-or-Wasm module script']
        function shouldSkip(msg){for(var i=0;i<noise.length;i++){if(msg.indexOf(noise[i])>-1)return true}return false}
        var C=window.console,methods={};['log','warn','error','debug','info','trace','dir','assert'].forEach(function(m){
          var orig=C[m];methods[m]=function(){for(var i=0;i<arguments.length;i++){if(shouldSkip(String(arguments[i])))return}return orig.apply(C,arguments)}
        })
        window.console=new Proxy(C,{get:function(t,p){return methods[p]||(typeof t[p]==='function'?t[p].bind(t):t[p])}})
        window.addEventListener('error',function(e){if(!shouldSkip(e.message||''))return;e.stopImmediatePropagation();e.preventDefault();if(sessionStorage.getItem('stale-chunk-reloaded')!=='true'){sessionStorage.setItem('stale-chunk-reloaded','true');location.reload()}},true)
        window.addEventListener('unhandledrejection',function(e){var m=(e.reason&&e.reason.message)||String(e.reason||'');if(shouldSkip(m)){e.preventDefault();return}if(m.indexOf('Failed to fetch')>-1||m.indexOf('Importing a module script failed')>-1||m.indexOf('Expected a JavaScript-or-Wasm module script')>-1||m.indexOf('Failed to load module')>-1){e.preventDefault();if(sessionStorage.getItem('stale-chunk-reloaded')!=='true'){sessionStorage.setItem('stale-chunk-reloaded','true');location.reload()}}})
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
